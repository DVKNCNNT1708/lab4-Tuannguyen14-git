name: Lab04 Docker and Newman Verification

on:
  push:
  pull_request:

jobs:
  docker-newman:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Lint OpenAPI contract
        run: npm run lint:openapi

      - name: Start Prism mock server
        run: |
          nohup npx prism mock contracts/iot-ingestion.openapi.yaml -p 4010 --host 0.0.0.0 > prism.log 2>&1 &
          echo $! > prism.pid
          echo "Prism PID: $(cat prism.pid)"
          sleep 5

      - name: Wait for mock health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4010/health > /dev/null 2>&1; then
              echo "✅ Prism mock server is ready!"
              exit 0
            fi
            echo "⏳ Waiting for Prism... attempt $i/30"
            sleep 2
          done
          echo "❌ Prism failed to start. Dumping logs:"
          cat prism.log || true
          exit 1

      - name: Run Newman against Prism mock
        run: npm run test:mock

      - name: Show Prism logs on failure
        if: failure()
        run: cat prism.log || true

      - name: Stop Prism mock server
        run: |
          kill $(cat prism.pid) 2>/dev/null || pkill -f "prism" || true
          sleep 1

      - name: Build Docker image
        run: docker build -t fit4110/iot-ingestion:lab04 .

      - name: Run Docker container
        run: |
          docker rm -f fit4110-iot-lab04 || true
          docker run -d \
            --name fit4110-iot-lab04 \
            -p 8000:8000 \
            --env-file .env.example \
            fit4110/iot-ingestion:lab04

      - name: Wait for service health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null 2>&1; then
              echo "✅ Docker container is ready!"
              exit 0
            fi
            echo "⏳ Waiting for container... attempt $i/30"
            sleep 2
          done
          echo "❌ Container failed to start. Dumping logs:"
          docker logs fit4110-iot-lab04 || true
          exit 1

      - name: Run Newman against Docker container
        run: npm run test:local

      - name: Show container logs on failure
        if: failure()
        run: docker logs fit4110-iot-lab04 || true

      - name: Stop container
        if: always()
        run: docker stop fit4110-iot-lab04 || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lab04-newman-reports
          path: reports/
